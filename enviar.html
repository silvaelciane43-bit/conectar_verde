<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Ação Verde</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/enviar.css">
</head>
<body>

    <div class="top-nav">
        <a href="/perfil">Meu Perfil</a>
    </div>

    <div class="card">
        <h2>Minha Ação Sustentável</h2>
        
        {% if erro %}
        <div style="background: #ffebee; color: #c62828; padding: 12px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #c62828;">
            ⚠️ {{ erro }}
        </div>
        {% endif %}
        <form action="/enviar" method="POST" enctype="multipart/form-data">
            
            <label for="descricao">O que você mudou hoje? (Ex: 5S na bancada)</label>
            <textarea id="descricao" name="descricao" rows="4" placeholder="Descreva brevemente sua ação sustentável..." required></textarea>
            
            <label for="foto">Anexe sua foto (Antes/Depois)</label>
            <input type="file" id="foto" name="foto" accept="image/*" required>
            
            <div id="image-preview"></div>
            
            <button type="submit">Enviar para Avaliação</button>
        
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
