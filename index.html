<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed Sustentável - Empresa</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/index.css">
</head>
<body>

    <header>
        <div style="display:flex; justify-content:space-between; align-items:center; max-width:500px; margin:0 auto;">
            <h1>EcoFeed 🌿</h1>
            <a href="/perfil" style="color:white; background:rgba(255,255,255,0.15); padding: 8px 14px; border-radius: 8px; text-decoration:none; font-size:14px;">Meu Perfil</a>
        </div>
    </header>

    <div class="feed-container">
        
        <div class="post-card">
            <div class="post-header">
                <div class="avatar">AS</div>
                <span>Ana Silva</span>
            </div>
            <div class="post-image-container">
                <img src="https://via.placeholder.com/250x250?text=Antes+5S" alt="Antes">
                <img src="https://via.placeholder.com/250x250?text=Depois+5S" alt="Depois">
            </div>
            <div class="post-content">
                <span class="tag">#Metodologia5S</span>
                <p>Organizei minha bancada de testes hoje. Tudo limpo e etiquetado para facilitar o próximo turno! 🚀</p>
            </div>
            <div class="post-actions">
                <button class="btn-action">❤️ Curtir</button>
                <button class="btn-action">💬 Comentar</button>
            </div>
        </div>

        <div class="post-card">
            <div class="post-header">
                <div class="avatar">LP</div>
                <span>Lucas Pereira</span>
            </div>
            <div class="post-image-container" style="justify-content: center;">
                <img src="https://via.placeholder.com/500x250?text=Copo+Reutilizável" alt="Ação" style="width: 100%;">
            </div>
            <div class="post-content">
                <span class="tag">#ConsumoConsciente</span>
                <p>Menos um copo descartável no mundo por dia! Minha nova caneca já está na ativa. ☕</p>
            </div>
            <div class="post-actions">
                <button class="btn-action">❤️ Curtir</button>
                <button class="btn-action">💬 Comentar</button>
            </div>
        </div>

    </div>

    <a href="/enviar" class="btn-flutuante">+</a>

</body>
</html>
